<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>
            {% block title %}
                SkillMatch AI
            {% endblock title %}
        </title>
        
        <!-- Link to main stylesheet -->
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
        <!-- Font Awesome for icons -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

        {% block style %}
        {% endblock %}
    </head>
    <body>
        <!-- Top Navigation Bar -->
        <nav class="navbar">
            <div class="nav-container">
                <a href="{{ url_for('index') }}" class="nav-logo">SkillMatch AI</a>
                <ul class="nav-menu">
                    <li><a href="{{ url_for('index') }}" {% if request.endpoint == 'index' %}class="active"{% endif %}>Home</a></li>
                    <li><a href="{{ url_for('results') }}" {% if request.endpoint == 'results' %}class="active"{% endif %}>Results</a></li>
                    <li><a href="{{ url_for('login') }}" {% if request.endpoint == 'login' %}class="active"{% endif %}>Login</a></li>
                    <li><a href="{{ url_for('about') }}" {% if request.endpoint == 'about' %}class="active"{% endif %}>About</a></li>
                </ul>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="content">
            {% block body %}
            {% endblock %}
        </main>

        {% block script %}
        {% endblock script %}
    </body>
</html>
