{% extends "layout.html" %}
<!-- All Page-Specific CSS Styles Go Here -->

<!-- All Page Content Goes Here -->
{% block body %}

<h1>Results</h1>

<!-- Delete button (initially disabled) -->
<button class="delete-btn" id="deleteSelected" onclick="deleteSelectedRows()" disabled>
    Delete Selected
</button>

<br /><br /><br />

<!-- Select All checkbox -->
<div class="select-all">
    <label>
        <input type="checkbox" id="selectAll" onchange="toggleAll(this)" />
        Select All
    </label>
</div>

<form id="deleteForm" method="POST" action="{{ url_for('delete_candidates') }}">

</form>

{% endblock body %}
